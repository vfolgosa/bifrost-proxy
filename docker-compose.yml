services:
  # ─────────────────────────────────────────────────────────
  # Kafka Cluster 1 (Primary) — KRaft mode, SASL/PLAIN
  # ─────────────────────────────────────────────────────────
  kafka1:
    image: confluentinc/cp-kafka:latest
    container_name: kafka1
    ports:
      - "19093:19093"
    volumes:
      - ./secrets/kafka1_jaas.conf:/etc/kafka/secrets/kafka_server_jaas.conf:ro
    environment:
      - CLUSTER_ID=7K8L9M0N-ABCD-EFGH-IJKL-MNOPQRSTUVWX
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_NODE_ID=1
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka1:29093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=PLAINTEXT://:9092,SASL_PLAINTEXT://:19093,CONTROLLER://:29093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka1:9092,SASL_PLAINTEXT://localhost:19093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_SASL_ENABLED_MECHANISMS=PLAIN
      - KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL=PLAIN
      - KAFKA_OPTS=-Djava.security.auth.login.config=/etc/kafka/secrets/kafka_server_jaas.conf
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ─────────────────────────────────────────────────────────
  # Kafka Cluster 2 (Secondary)
  # ─────────────────────────────────────────────────────────
  kafka2:
    image: confluentinc/cp-kafka:latest
    container_name: kafka2
    ports:
      - "19094:19094"
    volumes:
      - ./secrets/kafka2_jaas.conf:/etc/kafka/secrets/kafka_server_jaas.conf:ro
    environment:
      - CLUSTER_ID=9A1B2C3D-EFGH-IJKL-MNOP-QRSTUVWXYZ12
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_NODE_ID=2
      - KAFKA_CONTROLLER_QUORUM_VOTERS=2@kafka2:29094
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=PLAINTEXT://:9092,SASL_PLAINTEXT://:19094,CONTROLLER://:29094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka2:9092,SASL_PLAINTEXT://localhost:19094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_SASL_ENABLED_MECHANISMS=PLAIN
      - KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL=PLAIN
      - KAFKA_OPTS=-Djava.security.auth.login.config=/etc/kafka/secrets/kafka_server_jaas.conf
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ─────────────────────────────────────────────────────────
  # Init container
  # ─────────────────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-init
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
      - |
        kafka-topics --bootstrap-server kafka1:9092 --create --topic logistics-topic --partitions 3 --replication-factor 1 --if-not-exists
        kafka-topics --bootstrap-server kafka2:9092 --create --topic logistics-topic --partitions 3 --replication-factor 1 --if-not-exists
        echo '=== Init complete ==='
        kafka-topics --bootstrap-server kafka1:9092 --list
        kafka-topics --bootstrap-server kafka2:9092 --list

  # ─────────────────────────────────────────────────────────
  # Bifrost Proxy (http://localhost:8080)
  # ─────────────────────────────────────────────────────────
  bifrost:
    build: .
    container_name: bifrost
    ports:
      - "8080:8080"
      - "9094:9094"
    volumes:
      - ./config.local.yaml:/etc/bifrost/config.yaml:ro
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────
  # Redpanda Console — kafka1 (http://localhost:8081)
  # ─────────────────────────────────────────────────────────
  redpanda-kafka1:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-kafka1
    ports:
      - "8081:8080"
    environment:
      - KAFKA_BROKERS=kafka1:9092
    depends_on:
      kafka1:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────
  # Redpanda Console — kafka2 (http://localhost:8082)
  # ─────────────────────────────────────────────────────────
  redpanda-kafka2:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-kafka2
    ports:
      - "8082:8080"
    environment:
      - KAFKA_BROKERS=kafka2:9092
    depends_on:
      kafka2:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────
  # Prometheus — metrics (http://localhost:9090)
  # ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
