proxy:
  bind_address: "0.0.0.0"
  port: 9092
  tls:
    cert_file: ""
    key_file: ""
    enabled: true
  connection_pool:
    max_connections_per_broker: 50
    idle_timeout: "30s"
    keep_alive_interval: "30s"
  metrics_port: 8080

clusters:
  finance.proxy.example.com:
    mode: "active_passive"
    port: 9093
    active: "primary"
    primary: "localhost:9093"
    secondary: "localhost:9094"
    health_check:
      enabled: false
  localhost:
    mode: "active_passive"
    port: 9093
    active: "primary"
    primary: "localhost:9093"
    secondary: "localhost:9094"
    health_check:
      enabled: false
