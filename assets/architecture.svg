<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" style="background:#020617;font-family:system-ui,sans-serif">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0L0 0 0 30" fill="none" stroke="#1e293b" stroke-width=".5"/>
    </pattern>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="50%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <rect width="900" height="520" fill="url(#grid)"/>

  <!-- Client side -->
  <rect x="15" y="20" width="195" height="80" rx="10" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="112" y="42" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">Clients</text>
  <rect x="30" y="50" width="165" height="38" rx="6" fill="rgba(8,51,68,.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="112" y="68" fill="#22d3ee" font-size="11" text-anchor="middle">Kafka Clients</text>
  <text x="112" y="82" fill="#64748b" font-size="9" text-anchor="middle">SASL_SSL · SCRAM</text>

  <!-- Bifrost box -->
  <rect x="225" y="15" width="475" height="490" rx="10" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="462" y="37" fill="#a78bfa" font-size="12" font-weight="600" text-anchor="middle">Bifrost Proxy · :8080</text>

  <!-- Listener -->
  <rect x="240" y="52" width="210" height="42" rx="6" fill="rgba(76,29,149,.3)" stroke="#a78bfa" stroke-width="1"/>
  <text x="345" y="72" fill="#a78bfa" font-size="11" font-weight="600" text-anchor="middle">Multi-Port TCP Listener</text>
  <text x="345" y="86" fill="#64748b" font-size="8" text-anchor="middle">:9093 finance · :9094 logistics</text>

  <!-- SASL -->
  <rect x="470" y="52" width="215" height="42" rx="6" fill="rgba(136,19,55,.3)" stroke="#fb7185" stroke-width="1"/>
  <text x="577" y="72" fill="#fb7185" font-size="11" font-weight="600" text-anchor="middle">SASL Passthrough</text>
  <text x="577" y="86" fill="#64748b" font-size="8" text-anchor="middle">Blind forward · No creds stored</text>
  <line x1="450" y1="73" x2="467" y2="73" stroke="#fb7185" stroke-width="1.5"/>

  <!-- Metadata -->
  <rect x="240" y="108" width="210" height="42" rx="6" fill="rgba(6,78,59,.3)" stroke="#34d399" stroke-width="1"/>
  <text x="345" y="128" fill="#34d399" font-size="11" font-weight="600" text-anchor="middle">Metadata Rewrite</text>
  <text x="345" y="142" fill="#64748b" font-size="8" text-anchor="middle">Brokers → proxy address</text>
  <line x1="345" y1="94" x2="345" y2="105" stroke="#34d399" stroke-width="1.5"/>

  <!-- Produce/Fetch -->
  <rect x="470" y="108" width="215" height="42" rx="6" fill="rgba(120,53,15,.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="577" y="128" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">Produce/Fetch Router</text>
  <text x="577" y="142" fill="#64748b" font-size="8" text-anchor="middle">Partition-aware · Sticky hash</text>
  <line x1="450" y1="129" x2="467" y2="129" stroke="#fbbf24" stroke-width="1.5"/>

  <!-- Health -->
  <rect x="240" y="164" width="210" height="42" rx="6" fill="rgba(120,53,15,.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="345" y="184" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">Health Checker</text>
  <text x="345" y="198" fill="#64748b" font-size="8" text-anchor="middle">Metadata ping · 10s interval</text>

  <!-- Rebalancer -->
  <rect x="470" y="164" width="215" height="42" rx="6" fill="rgba(6,78,59,.3)" stroke="#34d399" stroke-width="1"/>
  <text x="577" y="184" fill="#34d399" font-size="11" font-weight="600" text-anchor="middle">Auto Rebalancer</text>
  <text x="577" y="198" fill="#64748b" font-size="8" text-anchor="middle">Weight adjustment · 70/30</text>
  <line x1="450" y1="185" x2="467" y2="185" stroke="#34d399" stroke-width="1.5"/>

  <!-- Circuit Breaker -->
  <rect x="240" y="220" width="445" height="42" rx="6" fill="rgba(136,19,55,.3)" stroke="#fb7185" stroke-width="1"/>
  <text x="462" y="240" fill="#fb7185" font-size="11" font-weight="600" text-anchor="middle">Circuit Breaker — 3 failovers / 5 min → manual mode</text>
  <text x="462" y="254" fill="#64748b" font-size="8" text-anchor="middle">Flap protection · BOTH_DOWN handling</text>
  <line x1="345" y1="206" x2="345" y2="217" stroke="#fb7185" stroke-width="1"/>
  <line x1="577" y1="206" x2="577" y2="217" stroke="#fb7185" stroke-width="1"/>

  <!-- Connection Pool -->
  <rect x="240" y="276" width="445" height="42" rx="6" fill="rgba(76,29,149,.3)" stroke="#a78bfa" stroke-width="1"/>
  <text x="462" y="296" fill="#a78bfa" font-size="11" font-weight="600" text-anchor="middle">Connection Pool — 50 conns/broker · TCP KeepAlive · Warm connections</text>
  <text x="462" y="310" fill="#64748b" font-size="8" text-anchor="middle">Per-cluster isolation · Backpressure on saturation</text>
  <line x1="345" y1="262" x2="345" y2="273" stroke="#a78bfa" stroke-width="1"/>
  <line x1="577" y1="262" x2="577" y2="273" stroke="#a78bfa" stroke-width="1"/>

  <!-- Observability -->
  <rect x="240" y="332" width="445" height="38" rx="6" fill="rgba(30,41,59,.4)" stroke="#64748b" stroke-width="1"/>
  <text x="462" y="354" fill="#94a3b8" font-size="10" font-weight="600" text-anchor="middle">/health · /metrics · /status · Dashboard · Hot Reload</text>

  <!-- Modes -->
  <rect x="240" y="382" width="445" height="38" rx="6" fill="rgba(8,51,68,.2)" stroke="#22d3ee" stroke-width="1"/>
  <text x="462" y="402" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">active_passive · load_balance · single</text>

  <!-- Hot reload -->
  <rect x="240" y="432" width="445" height="38" rx="6" fill="rgba(30,41,59,.2)" stroke="#64748b" stroke-width=".5"/>
  <text x="462" y="454" fill="#64748b" font-size="9" text-anchor="middle">fsnotify hot reload — edit config.yaml → live update</text>

  <!-- Arrows client→proxy -->
  <line x1="195" y1="65" x2="222" y2="65" stroke="#22d3ee" stroke-width="2"/>
  <text x="208" y="58" fill="#22d3ee" font-size="7" text-anchor="middle">:9093</text>
  <line x1="195" y1="78" x2="222" y2="95" stroke="#22d3ee" stroke-width="2"/>
  <text x="208" y="90" fill="#22d3ee" font-size="7" text-anchor="middle">:9094</text>

  <!-- Upstream -->
  <rect x="715" y="20" width="170" height="485" rx="10" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="800" y="42" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">Upstream Kafka</text>

  <rect x="725" y="55" width="150" height="80" rx="6" fill="rgba(8,51,68,.2)" stroke="#22d3ee" stroke-width="1"/>
  <text x="800" y="80" fill="#22d3ee" font-size="11" font-weight="600" text-anchor="middle">Confluent Cloud</text>
  <text x="800" y="98" fill="#94a3b8" font-size="8" text-anchor="middle">us-east-1</text>
  <text x="800" y="114" fill="#64748b" font-size="7" text-anchor="middle">Primary (70%)</text>
  <text x="800" y="128" fill="#22d3ee" font-size="9" text-anchor="middle">SASL_SSL</text>

  <rect x="725" y="150" width="150" height="80" rx="6" fill="rgba(120,53,15,.2)" stroke="#fbbf24" stroke-width="1"/>
  <text x="800" y="175" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">Confluent Cloud</text>
  <text x="800" y="193" fill="#94a3b8" font-size="8" text-anchor="middle">us-east-2</text>
  <text x="800" y="209" fill="#64748b" font-size="7" text-anchor="middle">Secondary (30%)</text>
  <text x="800" y="223" fill="#fbbf24" font-size="9" text-anchor="middle">SASL_SSL</text>

  <rect x="725" y="255" width="150" height="50" rx="6" fill="rgba(6,78,59,.2)" stroke="#34d399" stroke-width="1"/>
  <text x="800" y="278" fill="#34d399" font-size="10" font-weight="600" text-anchor="middle">Docker Compose</text>
  <text x="800" y="294" fill="#64748b" font-size="8" text-anchor="middle">kafka1/kafka2 · KRaft</text>

  <rect x="725" y="320" width="150" height="80" rx="6" fill="rgba(30,41,59,.3)" stroke="#64748b" stroke-width=".5"/>
  <text x="800" y="342" fill="#94a3b8" font-size="9" font-weight="600" text-anchor="middle">Monitoring</text>
  <text x="800" y="358" fill="#22d3ee" font-size="8" text-anchor="middle">Redpanda :8081</text>
  <text x="800" y="374" fill="#fbbf24" font-size="8" text-anchor="middle">Prometheus :9090</text>
  <text x="800" y="390" fill="#34d399" font-size="8" text-anchor="middle">Dashboard :8080</text>

  <!-- Proxy→Upstream arrows -->
  <line x1="700" y1="90" x2="722" y2="90" stroke="#22d3ee" stroke-width="2"/>
  <text x="710" y="83" fill="#22d3ee" font-size="7" text-anchor="middle">70%</text>
  <line x1="700" y1="190" x2="722" y2="190" stroke="#fbbf24" stroke-width="2"/>
  <text x="710" y="183" fill="#fbbf24" font-size="7" text-anchor="middle">30%</text>
  <line x1="700" y1="280" x2="722" y2="280" stroke="#34d399" stroke-width="1.5"/>

  <!-- Legend -->
  <rect x="15" y="410" width="195" height="95" rx="8" fill="rgba(15,23,42,.8)" stroke="#1e293b" stroke-width="1"/>
  <text x="30" y="430" fill="#94a3b8" font-size="10" font-weight="600">Legend</text>
  <rect x="30" y="440" width="10" height="10" rx="2" fill="#22d3ee"/><text x="46" y="449" fill="#94a3b8" font-size="9">Client / Primary</text>
  <rect x="30" y="456" width="10" height="10" rx="2" fill="#a78bfa"/><text x="46" y="465" fill="#94a3b8" font-size="9">Proxy internals</text>
  <rect x="30" y="472" width="10" height="10" rx="2" fill="#34d399"/><text x="46" y="481" fill="#94a3b8" font-size="9">Routing / Health</text>
  <rect x="30" y="488" width="10" height="10" rx="2" fill="#fb7185"/><text x="46" y="497" fill="#94a3b8" font-size="9">Security / SASL</text>
  <rect x="125" y="440" width="10" height="10" rx="2" fill="#fbbf24"/><text x="141" y="449" fill="#94a3b8" font-size="9">Cloud / Upstream</text>
  <rect x="125" y="456" width="10" height="10" rx="2" fill="#64748b"/><text x="141" y="465" fill="#94a3b8" font-size="9">Observability</text>
</svg>
