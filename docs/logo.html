<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bifrost — Logo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020617;display:flex;align-items:center;justify-content:center;min-height:100vh}
.logo{text-align:center}
.bridge{position:relative;width:400px;height:120px;margin:0 auto 20px}
</style>
</head>
<body>
<div class="logo">
  <svg width="480" height="180" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#22d3ee"/>
        <stop offset="25%" style="stop-color:#a78bfa"/>
        <stop offset="50%" style="stop-color:#34d399"/>
        <stop offset="75%" style="stop-color:#fbbf24"/>
        <stop offset="100%" style="stop-color:#fb7185"/>
      </linearGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <!-- Bridge arc -->
    <path d="M 20 140 Q 240 -20 460 140" fill="none" stroke="url(#rainbow)" stroke-width="6" filter="url(#glow)"/>
    <path d="M 40 140 Q 240 -10 440 140" fill="none" stroke="url(#rainbow)" stroke-width="2" opacity="0.5"/>
    <!-- Pillars -->
    <rect x="15" y="130" width="12" height="40" rx="2" fill="#64748b" opacity="0.6"/>
    <rect x="453" y="130" width="12" height="40" rx="2" fill="#64748b" opacity="0.6"/>
    <!-- Nodes on bridge -->
    <circle cx="100" cy="110" r="4" fill="#22d3ee" filter="url(#glow)"/>
    <circle cx="200" cy="65" r="4" fill="#a78bfa" filter="url(#glow)"/>
    <circle cx="280" cy="65" r="4" fill="#34d399" filter="url(#glow)"/>
    <circle cx="380" cy="110" r="4" fill="#fbbf24" filter="url(#glow)"/>
    <!-- Labels under nodes -->
    <text x="100" y="155" fill="#22d3ee" font-size="8" text-anchor="middle" font-family="monospace">finance</text>
    <text x="200" y="100" fill="#a78bfa" font-size="8" text-anchor="middle" font-family="monospace">logistics</text>
    <text x="280" y="100" fill="#34d399" font-size="8" text-anchor="middle" font-family="monospace">sales</text>
    <text x="380" y="155" fill="#fbbf24" font-size="8" text-anchor="middle" font-family="monospace">legacy</text>
    <!-- Bifrost text -->
    <text x="240" y="130" fill="#e2e8f0" font-size="42" font-weight="900" text-anchor="middle" font-family="system-ui,sans-serif" letter-spacing="8">BIFROST</text>
    <!-- Subtitle -->
    <text x="240" y="170" fill="#64748b" font-size="11" text-anchor="middle" font-family="monospace">Kafka L7 Proxy</text>
  </svg>
</div>
</body>
</html>
