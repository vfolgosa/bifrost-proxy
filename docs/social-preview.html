<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280,height=640">
<title>Bifrost — Social Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1280px;height:640px;background:linear-gradient(135deg,#020617 0%,#0f172a 50%,#1e1b4b 100%);display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,sans-serif;overflow:hidden}
.canvas{position:relative;width:1280px;height:640px}
.bg-grid{position:absolute;top:0;left:0;width:1280px;height:640px;opacity:.06}
.bg-grid line{stroke:#e2e8f0;stroke-width:.5}
.bridge-glow{position:absolute;top:180px;left:0;width:1280px;height:200px;background:radial-gradient(ellipse at center,rgba(168,127,250,.15) 0%,transparent 70%)}
.content{position:absolute;top:0;left:0;width:1280px;height:640px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.title{font-size:72px;font-weight:900;letter-spacing:12px;background:linear-gradient(90deg,#22d3ee,#a78bfa,#34d399,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none}
.subtitle{font-size:22px;color:#64748b;font-weight:400;letter-spacing:4px}
.tags{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;justify-content:center}
.tag{padding:6px 18px;border-radius:20px;font-size:14px;font-weight:600;letter-spacing:1px}
.tag-1{background:rgba(8,51,68,.6);color:#22d3ee;border:1px solid rgba(34,211,238,.3)}
.tag-2{background:rgba(76,29,149,.4);color:#a78bfa;border:1px solid rgba(168,127,250,.3)}
.tag-3{background:rgba(6,78,59,.5);color:#34d399;border:1px solid rgba(52,211,153,.3)}
.modes{display:flex;gap:8px;margin-top:8px;color:#64748b;font-size:14px;font-family:monospace}
.mode-active{color:#22d3ee}
.tagline{position:absolute;bottom:32px;left:0;width:1280px;text-align:center;color:#475569;font-size:14px;font-family:monospace;letter-spacing:2px}
</style>
</head>
<body>
<div class="canvas">
  <svg class="bg-grid" viewBox="0 0 1280 640">
    <defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 L0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width=".5"/></pattern></defs>
    <rect width="1280" height="640" fill="url(#g)"/>
  </svg>
  <svg viewBox="0 0 1280 640" style="position:absolute;top:0;left:0;width:1280px;height:640px">
    <defs>
      <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#22d3ee"/>
        <stop offset="30%" stop-color="#a78bfa"/>
        <stop offset="60%" stop-color="#34d399"/>
        <stop offset="100%" stop-color="#fbbf24"/>
      </linearGradient>
      <filter id="glow"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <!-- Bridge arc -->
    <path d="M 80 520 Q 640 100 1200 520" fill="none" stroke="url(#rainbow)" stroke-width="8" filter="url(#glow)" opacity=".7"/>
    <path d="M 100 520 Q 640 115 1180 520" fill="none" stroke="url(#rainbow)" stroke-width="2" opacity=".3"/>
    <!-- Cluster nodes -->
    <circle cx="240" cy="380" r="8" fill="#22d3ee" filter="url(#glow)"/>
    <circle cx="440" cy="275" r="8" fill="#a78bfa" filter="url(#glow)"/>
    <circle cx="640" cy="245" r="8" fill="#34d399" filter="url(#glow)"/>
    <circle cx="840" cy="275" r="8" fill="#fbbf24" filter="url(#glow)"/>
    <circle cx="1040" cy="380" r="8" fill="#fb7185" filter="url(#glow)"/>
    <!-- BU labels -->
    <text x="240" y="410" fill="#22d3ee" font-size="10" text-anchor="middle" font-family="monospace">finance</text>
    <text x="440" y="260" fill="#a78bfa" font-size="10" text-anchor="middle" font-family="monospace">logistics</text>
    <text x="640" y="230" fill="#34d399" font-size="10" text-anchor="middle" font-family="monospace">sales</text>
    <text x="840" y="260" fill="#fbbf24" font-size="10" text-anchor="middle" font-family="monospace">legacy</text>
    <text x="1040" y="410" fill="#fb7185" font-size="10" text-anchor="middle" font-family="monospace">analytics</text>
  </svg>
  <div class="bridge-glow"></div>
  <div class="content">
    <div class="title">BIFROST</div>
    <div class="subtitle">KAFKA L7 PROXY</div>
    <div class="tags">
      <span class="tag tag-1">Port-Based</span>
      <span class="tag tag-2">SASL Passthrough</span>
      <span class="tag tag-3">Auto Failover</span>
    </div>
    <div class="modes">
      <span class="mode-active">active_passive</span> ·
      <span class="mode-active">load_balance</span> ·
      single
    </div>
  </div>
  <div class="tagline">Route Kafka traffic across the nine realms · github.com/vfolgosa/bifrost-proxy</div>
</div>
</body>
</html>
